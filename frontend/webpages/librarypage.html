{%include 'layout.html' %}
<div class="container">
    <div class="card text-center "> 
        <div class="card-header">
            your linked libraries 
        </div>
        <div class="card-body">
            <h5 class = "card-title">
                list of libraries
            </h5>
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>library name</th>
                        <th>library postcode</th>
                        <th>Select</th>
                    </tr>
                </thead>
                <tbody>
                    {% for library in libraries %}
                    <tr class="pointer">
                        <td>{{loop.index}}</td>
                        <td>{{library.name}}</td>
                        <td>{{library.postcode}}</td>
                    </tr>
                 {% endfor %}   
                </tbody>
            </table>
            <div class="card-footer">
                <a href="/auth/addlibrary"><button class="btn-primary"> add library to your list </button></a>
            </div>
        </div>
    </div>
</div>
