{%include 'layout.html' %}  

   
    <div class="container">
        <div class="card">
      <div class = "card-header">
        register
      </div>
      <div class="card-body">
        <form id="registerForm">
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label>     Email       </label>
                    <input type="email" class="form-control" name="email" required>
                </div>
                <div class="form-group col-md-6">
                    <label>username</label>
                    <input type="text" class = "form-control" name="username" required>

                </div>

            </div>
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label>     first name       </label>
                    <input type="text" class="form-control" name="first_name" required>
                </div>
                <div class="form-group col-md-6">
                    <label>lastname</label>
                    <input type="text" class = "form-control" name="last_name" required>

                </div>

            </div>     
             <div class="form-row">
                <div class="form-group col-md-12">
                    <label>    seect your role       </label>
                    <select id="roles" name="user_roles">
                        <option value="admin">admin </option>
                        <option value="user">user</option>
                        <option value="librian">librian</option>
                
                    </select>
                   
                </div>
               

            </div>
               <div class="form-row">
                <div class="form-group col-md-6">
                    <label>     password       </label>
                    <input type="password" class="form-control" name="password" autocomplete="new-password" required>
                </div>
                <div class="form-group col-md-6">
                    <label>verify password </label>
                    <input type="password" class = "form-control" name="password2"  autocomplete="new-password" required>

                </div>


            </div>
            <div id ="enter_admin_code" class="form-row">
            <div class=" form-group col-md-6">
               
                    <label for="admin_pin">what is the admin password </label>
                    <input   type="text"  class="form-control"  id="admin_pin"   name="admin_pin">

            </div>

            </div>
            <button type="submit" class="btn-primary"><i class="fa-regular fa-circle-check"></i> sign in</button>
            


        </form>
      </div>
      <div class="card-footer text-muted">
            <a href="/"><button  class = "btn-primary"> <i class="fa-regular fa-house"></i>home</button ></a>

          

 </div>
        </div>
   </div>
