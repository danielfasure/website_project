{%include 'layout.html' %}  

    <div class="container">
        <div class="card">
      <div class = "card-header">
        add books
      </div>
      <div class="card-body">
        <form id="add_books">
      
            
               <div class="form-row">
                <div class="form-group col-md-6">
                    <label>     book name       </label>
                    <input type="text" class="form-control" name="book_name" autocomplete="enter name" required>
                </div>
                <div class="form-group col-md-6">
                    <label>book author </label>
                    <input type="text" class = "form-control" name="book_author"  autocomplete="author name " required>

                </div>

            </div>
            <button type="submit" class="btn-primary text-center" id="addbook" data-library="{{ library}}" > add book </button>
          

        </form>
          <a href="/lib/book-page?library_id={{library}}"> <button>return to books</button></a>
            
        </div>
      </div>
      <div class="card-footer text-muted">
            <a href="/"><button  class = "btn-primary"> home</button ></a>

            <a href="/auth/login-page"><button class="btn-primary"> login</button></a>

       </div>
    </div>
