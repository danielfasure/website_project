{% include 'layout.html' %}
<div class="container">
    <div class="card text-center "> 
        <div class="card-header">
            {{library.name}} list of books
        </div>
        <div class="card-body">
            <h5 class = "card-title">
               you can select a book to rent 
            </h5>
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>book name</th>
                        <th>book author</th>
                        <th>Select</th>
                    </tr>
                </thead>
                <tbody>
                    {% for book in library_book %}
                    <tr class="pointer">
                        <td>{{loop.index}}</td>
                        <td>{{book.book_name}}</td>
                        <td>{{book.book_author}}</td>
                        <td>
                            <button class="select-btn "value ="{{book.id}}" >
                                select
                          
                            </button>
                    </td>
                    </tr>
                 {% endfor %}   
                </tbody>
            </table>
            <div class="card-footer">
            <button class="btn-primary" id="loadbook" value="{{ library.id }}" > add book to library</button>
           <a href="/auth/library-page"  > <button class="btn-primary "> return back to libraries selection </button>
              </a>
            </div>
        </div>
    </div>
</div>
