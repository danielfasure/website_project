
<div class="container">
    <div class="card text-center "> 
        <div class="card-header">
            {{user.name}} list of loaned books
            
        </div>
        <div class="card-body">
            <h5 class = "card-title">
               you can select a book to return
            </h5>
            
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>book name</th>
                        <th>book author</th>
                        <th>Select</th>
                    </tr>
                </thead>
                <tbody>
                    
                    {% for book in library_book %}
                      {% if book.userid==user.id %}
                    <tr class="pointer">
                        <td>{{loop.index}}</td>
                        <td>{{book.book_name}}</td>
                        <td>{{book.book_author}}</td>
                        <td>
                            <input type = "checkbox" class ="return_book_selector" value="{{book.id}}">
                          
                    </td>
                    </tr>
                    {% endif %}
                 {% endfor %}   
               
                </tbody>
            </table>
            <div class="card-footer">
           <p> you must return your book to avoid fine</p>
       
         
            </div>
               <button class ="btn-primary " id ="returnbook"> click here to try and return the book </button>
         
        </div>
    </div>
</div>
